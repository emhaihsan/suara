services:
  # ─── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: suara-postgres
    environment:
      POSTGRES_USER: suara
      POSTGRES_PASSWORD: suarapass
      POSTGRES_DB: suara_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suara -d suara_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suara-network

  # ─── Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: suara-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suara-network

  # ─── Message Broker ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: suara-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: suara
      RABBITMQ_DEFAULT_PASS: suarapass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suara-network

  # ─── Object Storage ─────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: suara-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suara-network

  # ─── MinIO Bucket Auto-Setup ─────────────────────────────────
  setup-minio:
    image: minio/mc
    container_name: suara-setup-minio
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/suara-voices --ignore-existing;
      mc anonymous set public myminio/suara-voices;
      echo 'Bucket suara-voices created and configured';
      "
    networks:
      - suara-network

  # ─── API Gateway ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: suara-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./services/gateway/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./services/gateway/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    networks:
      - suara-network

networks:
  suara-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
